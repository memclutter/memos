name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Lint, type-check, test
        working-directory: scripts/memos
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy
          uv run pytest

      - name: Doctor
        run: uv run memos doctor
