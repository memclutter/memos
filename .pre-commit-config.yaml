# The uv workspace root lives in scripts/, so uv keeps the virtualenv at
# scripts/.venv and tool caches at scripts/.cache (via scripts/memos/pyproject.toml)
# without any environment variables. Hooks run uv from scripts/memos.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd scripts/memos && uv run ruff check .'
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff format --check
        entry: bash -c 'cd scripts/memos && uv run ruff format --check .'
        language: system
        pass_filenames: false
        always_run: true
      - id: mypy
        name: mypy
        entry: bash -c 'cd scripts/memos && uv run mypy'
        language: system
        pass_filenames: false
        always_run: true
      - id: memos-doctor
        name: memos doctor
        entry: bash -c 'cd scripts/memos && uv run memos doctor'
        language: system
        pass_filenames: false
        always_run: true
